    <style>
        .alternate-color span:nth-child(odd) {
            color: #0f479f;
        }

        .alternate-color span:nth-child(even) {
            color: #ed2788;
        }

            display: block;

</head>
<body style="background-color: #000000">
    <h1 style="font-family:'Cursive'; font-size: 110px; color: #ed2788;">amelie is my girlfriend :))) 💐🦢</h1>
    <p class="alternate-color" style="font-family:'Cursive'; text-align: center;font-size: 60px;">I really like her !! She's sweet and loves tv girl 🙏</p>
    <img src="images/amelie.jpg" alt="amelie" class="center-image"/>

    <img src="images/tvgirll.jpg" alt="tvgirll" class="center-image" width="200" height="200"/>
    <script> 
        function applyAlternateColors() {
            document.querySelectorAll('.alternate-color').forEach(element => {
                const text = element.innerText;
                element.innerHTML = '';
                text.split('').forEach((char, index) => {
                    const span = document.createElement('span');
                    span.innerText = char;
                    element.appendChild(span);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', applyAlternateColors);
    </script>
</body>
</html>
